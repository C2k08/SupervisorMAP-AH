<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mapa Supervisor Adolfo Hernandez</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      
      <!-- Panel UI Flotante -->
      <div class="ui-container">
        <!-- Buscador -->
        <header class="search-header">
          <div style="display: flex; gap: 8px; align-items: center;">
            <div class="search-box" style="flex: 1;">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              <input type="text" id="searchInput" placeholder="Buscar instalación o categoría..." />
            </div>
            
            <button id="locateMeBtn" class="locate-btn" title="Mi ubicación central" aria-label="Mi ubicación center">
              <svg class="locate-icon" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 15a5 5 0 110-10 5 5 0 010 10z"/>
              </svg>
            </button>
          </div>
          
          <!-- Boton de expandir lista en movil movido a la zona superior -->
          <button id="toggleListBtn" class="toggle-list-btn mt-10">
            Lista de Instalaciones
          </button>
        </header>

        <!-- Contenedor Desplegable Lista -->
        <div id="locationsPanel" class="locations-panel hidden-mobile">
          <div class="panel-header">
            <h2>Instalaciones (<span id="countDisplay">0</span>)</h2>
          </div>
          <div id="locationsList" class="locations-list">
            <!-- Items generados dinamicamente desde main.js -->
          </div>
        </div>
      </div>
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
